services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      # Webhook notification for controller
      MINIO_NOTIFY_WEBHOOK_ENABLE_DSIMAGING: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_DSIMAGING: "http://controller:8080/webhook/minio"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  controller:
    build:
      context: ./controller
    ports:
      - "${CONTROLLER_PORT:-8080}:8080"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      BUCKET_NAME: ${BUCKET_NAME:-imaging-data}
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  # One-time init: creates bucket, enables versioning, configures webhooks
  init:
    build:
      context: ./scripts
      dockerfile: Dockerfile.init
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      BUCKET_NAME: ${BUCKET_NAME:-imaging-data}
    depends_on:
      minio:
        condition: service_healthy

volumes:
  minio-data:
